  '1.7.25': "{{ containerd_package }}=1.7.25-1"
  '1.7.27': "{{ containerd_package }}=1.7.27-1"
  'stable': "{{ containerd_package }}=1.7.25-1"
  'edge': "{{ containerd_package }}=1.7.25-1"

# https://download.docker.com/linux/debian/
docker_versioned_pkg:
  'latest': docker-ce
  '1.11': docker-engine=1.11.2-0~{{ ansible_distribution_release|lower }}
  '1.12': docker-engine=1.12.6-0~debian-{{ ansible_distribution_release|lower }}
  '1.13': docker-engine=1.13.1-0~debian-{{ ansible_distribution_release|lower }}
  '17.03': docker-ce=17.03.2~ce-0~debian-{{ ansible_distribution_release|lower }}
  'stable': docker-ce=17.03.2~ce-0~debian-{{ ansible_distribution_release|lower }}
  'edge': docker-ce=17.12.1~ce-0~debian-{{ ansible_distribution_release|lower }}
  '28.5': docker-ce

docker_cli_versioned_pkg:
  'latest': docker-ce-cli
  '28.5': docker-ce-cli

docker_package_info:
  pkgs:
    - "containerd.io"
    - "docker-ce={{ docker_cli_version }}*"
    - "docker-ce-cli={{ docker_cli_version }}*"
    - "docker-buildx-plugin"
    - "docker-compose-plugin"

docker_repo_key_info:
  url: '{{ docker_debian_repo_gpgkey }}'
  repo_keys:
    - '{{ docker_debian_repo_repokey }}'

docker_repo_info:
  pkg_repo: apt_repository
  repos:
    - >
      deb
      {% if ansible_distribution == 'Debian' and ansible_distribution_major_version | int >= 13 %}[signed-by=/etc/apt/keyrings/docker.asc] {% endif %}{{ docker_debian_repo_base_url }}
      {% if ansible_distribution == 'Debian' and ansible_distribution_major_version | int >= 13 %}bookworm{% else %}{{ ansible_distribution_release | lower }}{% endif %}
      stable
